<style>
#error-page {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:2rem 5vw;
  background:var(--dark); position:relative; overflow:hidden;
}
#error-page::before {
  content:'404'; position:absolute;
  font-family:var(--serif); font-size:clamp(10rem,28vw,20rem);
  color:rgba(125,197,39,0.04); font-weight:400;
  line-height:1; pointer-events:none; user-select:none;
}
.err-inner { position:relative; z-index:2; max-width:500px; }
.err-code { font-family:var(--mono); font-size:0.65rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--green); margin-bottom:1.5rem; display:block; }
.err-title { font-family:var(--serif); font-size:clamp(2.5rem,6vw,4.5rem); color:var(--white); line-height:1.05; margin-bottom:1.2rem; font-weight:400; }
.err-title em { font-style:italic; color:var(--green); }
.err-sub { font-size:1rem; color:rgba(255,255,255,0.45); line-height:1.75; margin-bottom:2.5rem; }
.err-links { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2.5rem; }
.err-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(255,255,255,0.06); width:100%; border-radius:4px; overflow:hidden; }
.err-item { background:rgba(255,255,255,0.03); padding:1.2rem 1rem; text-decoration:none; text-align:center; transition:background 0.2s; }
.err-item:hover { background:rgba(125,197,39,0.08); }
.err-item-label { font-family:var(--mono); font-size:0.54rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.3); display:block; margin-bottom:0.2rem; }
.err-item-name { font-family:var(--sans); font-size:0.85rem; font-weight:500; color:var(--white); }
@media(max-width:480px){ .err-grid{grid-template-columns:1fr 1fr} .err-links{flex-direction:column;align-items:center} }
</style>
</head>
<body data-solidnav="1">

    <span class="err-code">404 — Page Not Found</span>

    <p class="err-sub">The page you are looking for may have been moved or no longer exists. Let&rsquo;s get you back on track.</p>
    <div class="err-links">
      <a href="index.html" class="pill-btn green">Go to Homepage</a>

      <a href="services.html" class="err-item"><span class="err-item-label">Explore</span><span class="err-item-name">Services</span></a>

      <a href="projects.html" class="err-item"><span class="err-item-label">See</span><span class="err-item-name">Projects</span></a>
      <a href="contact.html" class="err-item"><span class="err-item-label">Talk to us</span><span class="err-item-name">Contact</span></a>
      <a href="tel:+27843826567" class="err-item"><span class="err-item-label">Call Direct</span><span class="err-item-name">+27 84 382 6567</span></a>
